<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>AHM — Reports</title><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;700&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet"><style>:root{--bg:#080807;--s1:#0F0F0D;--s2:#171714;--rule:#2C2C28;--text:#EDE9DC;--muted:#7A7770;--blue:#1D6FA4;--amber:#D4860A;--green:#16A34A;--red:#E11934}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Syne,sans-serif}.header{display:flex;gap:12px;align-items:center;padding:16px 20px;border-bottom:1px solid var(--rule);background:var(--s1)}h1{margin:0;font:18px 'Bebas Neue',sans-serif;letter-spacing:.1em}.spacer{flex:1}.btn,select{background:var(--s2);border:1px solid var(--rule);color:var(--text);padding:8px 10px;border-radius:4px}.wrap{padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:16px}.panel{background:var(--s1);border:1px solid var(--rule);border-radius:8px;padding:16px}.full{grid-column:1/-1}.title{font:13px 'Bebas Neue',sans-serif;letter-spacing:.12em;color:var(--muted);margin-bottom:12px}.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}.stat{background:var(--s2);border:1px solid var(--rule);padding:12px;border-radius:6px}.v{font:26px 'Bebas Neue',sans-serif}.l{font:10px 'IBM Plex Mono',monospace;color:var(--muted);text-transform:uppercase}.list{display:flex;flex-direction:column;gap:8px}.row{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;background:var(--s2);border:1px solid var(--rule);border-radius:6px}.main{flex:1}.small{font:10px 'IBM Plex Mono',monospace;color:var(--muted)}.pill{font:10px 'IBM Plex Mono',monospace;padding:3px 7px;border-radius:999px;border:1px solid var(--rule)}@media(max-width:900px){.wrap{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}</style></head><body><div class='header'><button class='btn' onclick="location.href='/ops'">←</button><h1>REPORTING // AUDIT</h1><div class='spacer'></div><select id='client' onchange='loadAll()'><option value=''>All clients</option><option value='unt'>UNT</option><option value='buddhas'>Buddha's</option><option value='chromapages'>Chromapages</option></select></div><div class='wrap'><div class='panel full'><div class='title'>EXECUTIVE SUMMARY</div><div class='stats'><div class='stat'><div class='v' id='deliveryRate'>0</div><div class='l'>Delivery Rate %</div></div><div class='stat'><div class='v' id='approvalQueue'>0</div><div class='l'>Approval Queue</div></div><div class='stat'><div class='v' id='deliveredCount'>0</div><div class='l'>Delivered</div></div><div class='stat'><div class='v' id='blockedCount'>0</div><div class='l'>Blocked</div></div><div class='stat'><div class='v' id='projectCount'>0</div><div class='l'>Projects</div></div><div class='stat'><div class='v' id='activeProjectCount'>0</div><div class='l'>Active Projects</div></div></div></div><div class='panel'><div class='title'>AUDIT EVENT COUNTS</div><div id='counts' class='list'></div></div><div class='panel'><div class='title'>RECENT AUDIT EVENTS</div><div id='events' class='list'></div></div></div><script>function q(){const c=document.getElementById('client').value;return c?`?client=${c}`:''}function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}function pill(t){return `<span class='pill'>${esc(t)}</span>`}function list(id,items,render,empty='Nothing here'){document.getElementById(id).innerHTML=items.length?items.map(render).join(''):`<div class='small'>${empty}</div>`}async function loadAll(){const [sum,execRep]=await Promise.all([fetch(`/api/reports/summary${q()}`).then(r=>r.json()),fetch(`/api/reports/executive${q()}`).then(r=>r.json())]); const r=execRep.report; for (const k of ['deliveryRate','approvalQueue','deliveredCount','blockedCount','projectCount','activeProjectCount']) document.getElementById(k).textContent=r[k]??0; list('counts',Object.entries(sum.summary.byType||{}),([k,v])=>`<div class='row'><div class='main'><div>${pill(k)} <strong>${v}</strong></div></div></div>`,'No audit counts'); list('events',sum.events||[],e=>`<div class='row'><div class='main'><div>${pill(e.event_type)} <strong>${esc(e.entity_type||'entity')} ${esc(e.entity_id||'')}</strong></div><div class='small'>client=${esc(e.client_id||'')} • project=${esc(e.project_id||'')} • actor=${esc(e.actor||'')} • ${new Date(e.created_at).toLocaleString()}</div></div></div>`,'No events')}loadAll();setInterval(loadAll,30000)</script></body></html>
