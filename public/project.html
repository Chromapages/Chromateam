<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>AHM — Project</title><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;700&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet"><style>:root{--bg:#080807;--s1:#0F0F0D;--s2:#171714;--rule:#2C2C28;--text:#EDE9DC;--muted:#7A7770;--blue:#1D6FA4;--amber:#D4860A;--green:#16A34A;--red:#E11934;--purple:#7C3AED}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Syne,sans-serif}.header{display:flex;gap:12px;align-items:center;padding:16px 20px;border-bottom:1px solid var(--rule);background:var(--s1);position:sticky;top:0}.header h1{margin:0;font:18px 'Bebas Neue',sans-serif;letter-spacing:.1em}.spacer{flex:1}.wrap{padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:16px}.full{grid-column:1/-1}.panel{background:var(--s1);border:1px solid var(--rule);border-radius:8px;padding:16px}.title{font:13px 'Bebas Neue',sans-serif;letter-spacing:.12em;color:var(--muted);margin-bottom:12px}.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.stat{background:var(--s2);border:1px solid var(--rule);padding:12px;border-radius:6px}.v{font:26px 'Bebas Neue',sans-serif}.l{font:10px 'IBM Plex Mono',monospace;color:var(--muted);text-transform:uppercase}.list{display:flex;flex-direction:column;gap:8px}.row{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;background:var(--s2);border:1px solid var(--rule);border-radius:6px}.main{flex:1}.small{font:10px 'IBM Plex Mono',monospace;color:var(--muted)}.pill{font:10px 'IBM Plex Mono',monospace;padding:3px 7px;border-radius:999px;border:1px solid var(--rule)}.btn{background:var(--s2);border:1px solid var(--rule);color:var(--text);padding:8px 10px;border-radius:4px;cursor:pointer}.field,select,textarea{width:100%;background:var(--s2);border:1px solid var(--rule);color:var(--text);padding:10px;border-radius:6px}.controls{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px}.artifact a{color:#9dd1ff}.done{color:var(--green);border-color:var(--green)}.active{color:var(--blue);border-color:var(--blue)}.blocked{color:var(--red);border-color:var(--red)}.pending{color:var(--amber);border-color:var(--amber)}@media(max-width:900px){.wrap{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.controls{grid-template-columns:1fr}}</style></head><body><div class='header'><button class='btn' onclick="location.href='/ops'">←</button><h1 id='heading'>PROJECT //</h1><div class='spacer'></div><button class='btn' onclick='launchPipeline()'>Launch Pipeline</button></div><div class='wrap'><div class='panel full'><div class='title'>PROJECT OVERVIEW</div><div class='stats'><div class='stat'><div class='v' id='sRuns'>0</div><div class='l'>Runs</div></div><div class='stat'><div class='v' id='sCompleted'>0</div><div class='l'>Completed</div></div><div class='stat'><div class='v' id='sFailed'>0</div><div class='l'>Failed</div></div><div class='stat'><div class='v' id='sApprovals'>0</div><div class='l'>Approvals</div></div><div class='stat'><div class='v' id='sArtifacts'>0</div><div class='l'>Artifacts</div></div></div></div><div class='panel full'><div class='title'>PIPELINE LAUNCHER</div><div class='controls'><select id='template'></select><input id='task' class='field' placeholder='What do you want delivered?'><input id='context' class='field' placeholder='Context / constraints'><button class='btn' onclick='launchPipeline()'>Run</button></div></div><div class='panel'><div class='title'>APPROVALS</div><div id='approvals' class='list'></div></div><div class='panel'><div class='title'>PIPELINES</div><div id='pipelines' class='list'></div></div><div class='panel full'><div class='title'>ARTIFACTS</div><div id='artifacts' class='list'></div></div><div class='panel full'><div class='title'>RUN HISTORY</div><div id='handoffs' class='list'></div></div></div><script>const qp=new URLSearchParams(location.search);const projectId=qp.get('id');if(!projectId){document.body.innerHTML='<div style="padding:24px;color:white">Missing project id</div>'}function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}function pill(c,t){return `<span class="pill ${c}">${esc(t)}</span>`}async function j(u,o){const r=await fetch(u,o);return r.json()}async function loadTemplates(){const d=await j('/api/service-templates');document.getElementById('template').innerHTML=d.templates.map(t=>`<option value="${t.key}">${t.name}</option>`).join('')}function list(id,items,render,empty='Nothing here'){document.getElementById(id).innerHTML=items.length?items.map(render).join(''):`<div class='small'>${empty}</div>`}async function load(){const d=await j(`/api/projects/${projectId}/details`);document.getElementById('heading').textContent=`PROJECT // ${d.project.name}`;document.getElementById('sRuns').textContent=d.performance.totalRuns;document.getElementById('sCompleted').textContent=d.performance.completed;document.getElementById('sFailed').textContent=d.performance.failed;document.getElementById('sApprovals').textContent=d.performance.approvalsPending;document.getElementById('sArtifacts').textContent=d.performance.artifacts;list('approvals',d.approvals,a=>`<div class='row'><div class='main'><div>${pill('pending',a.approvalStatus||a.column)} <strong>${esc(a.title)}</strong></div><div class='small'>${esc(a.description||'')}</div></div><button class='btn' onclick="deliver('${a.id}')">Deliver</button></div>`,'No approvals');list('pipelines',d.pipelines,p=>`<div class='row'><div class='main'><div>${pill(p.status==='completed'?'done':p.status==='failed'?'blocked':'active',p.status)} <strong>${esc(p.id)}</strong></div><div class='small'>${p.steps} steps</div></div><button class='btn' onclick="cancelPipeline('${p.id}')">Cancel</button></div>`,'No pipelines');list('artifacts',d.artifacts,a=>`<div class='row artifact'><div class='main'><div>${pill(a.finalOutcome==='artifact_verified'?'done':'pending',a.agent)} <strong>${esc(a.task||'artifact')}</strong></div><div class='small'><a href='file://${a.path}' target='_blank'>${esc(a.path)}</a></div></div></div>`,'No artifacts yet');list('handoffs',d.handoffs.slice(0,25),h=>`<div class='row'><div class='main'><div>${pill(h.status==='completed'?'done':h.status==='failed'?'blocked':'active',h.status)} <strong>${esc(h.task)}</strong></div><div class='small'>${esc(h.toAgent)} • ${esc(h.finalOutcome||'')} • ${new Date(h.completedAt||h.responseAt||h.startedAt||h.createdAt).toLocaleString()}</div></div>${h.status==='failed'?`<button class='btn' onclick="retryHandoff('${h.id}')">Retry</button>`:''}${['pending','in_progress'].includes(h.status)?`<button class='btn' onclick="cancelHandoff('${h.id}')">Cancel</button>`:''}${h.artifacts&&h.artifacts.length?`<button class='btn' onclick="inspectArtifacts('${h.id}')">Artifacts</button>`:''}</div>`,'No runs yet')}async function launchPipeline(){const template=document.getElementById('template').value;const task=document.getElementById('task').value.trim();const context=document.getElementById('context').value.trim();if(!template||!task)return;const d=await j(`/api/projects/${projectId}/details`);const res=await j(`/api/service-template/${template}/launch`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task,context,projectId,client:d.project.clientId,runAsync:true})});if(res.success){document.getElementById('task').value='';load()}else alert(res.error||'Failed')}async function deliver(id){const note=prompt('Delivery note (optional):')||'';const res=await j(`/api/approvals/task/${id}/deliver`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({note})});if(res.success)load();else alert(res.error||'Failed')}async function retryHandoff(id){const res=await j(`/api/handoff/${id}/retry`,{method:'POST'});if(res.success)load();else alert(res.error||'Failed')}async function cancelHandoff(id){if(!confirm('Cancel this handoff?'))return;const res=await j(`/api/handoff/${id}/cancel`,{method:'POST'});if(res.success)load();else alert(res.error||'Failed')}async function cancelPipeline(id){if(!confirm('Cancel this pipeline?'))return;const res=await j(`/api/pipeline/${id}/cancel`,{method:'POST'});if(res.success)load();else alert(res.error||'Failed')}async function inspectArtifacts(id){const d=await j(`/api/handoff/${id}/deliverables`);if(!d.files||!d.files.length){alert('No artifacts found');return}const first=d.files[0];const p=await j(`/api/handoff/${id}/artifact-preview?path=${encodeURIComponent(first.path)}`);alert(`${first.path}\n\n${p.content||''}`)}loadTemplates().then(load)</script></body></html>
