<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AHM — Approvals</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#09090B">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global-nav.css?v=2026.03.15.1">
  <link rel="stylesheet" href="css/ahm-design.css?v=2026.03.15.1">
</head>
<body class="ahm-page">

  <div class="ahm-accent-bar"></div>

  <header class="ahm-header">
    <button id="ahm-nav-toggle" class="btn-icon" aria-label="Toggle navigation">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <span class="ahm-header-logo">AHM<span class="logo-dot">·</span></span>
    <div class="ahm-header-sep"></div>
    <span class="ahm-header-title">Approvals</span>
    <div class="ahm-header-spacer"></div>
    <div class="ahm-header-actions">
      <div class="conn-badge">
        <div class="conn-dot live" id="connDot"></div>
        <span id="connLabel">LIVE</span>
      </div>
      <select id="clientFilter" class="field" style="width:140px;height:32px;" onchange="loadApprovals()">
        <option value="">All Clients</option>
        <option value="unt">UNT</option>
        <option value="buddhas">Buddha's</option>
        <option value="chromapages">Chromapages</option>
      </select>
    </div>
  </header>

  <div class="page-wrap">

    <!-- Metrics Strip -->
    <div class="metrics-row mb-5" id="metricsRow">
      <div class="metric-card mc-amber">
        <div class="metric-label">Pending</div>
        <div class="metric-value mv-amber" id="statPending">—</div>
      </div>
      <div class="metric-card mc-green">
        <div class="metric-label">Approved</div>
        <div class="metric-value mv-green" id="statApproved">—</div>
      </div>
      <div class="metric-card mc-red">
        <div class="metric-label">Rejected</div>
        <div class="metric-value mv-red" id="statRejected">—</div>
      </div>
      <div class="metric-card mc-blue">
        <div class="metric-label">UNT</div>
        <div class="metric-value mv-blue" id="statUnt">—</div>
      </div>
      <div class="metric-card mc-purple">
        <div class="metric-label">Buddha's</div>
        <div class="metric-value mv-purple" id="statBuddhas">—</div>
      </div>
    </div>

    <!-- Filter Tabs -->
    <div class="filter-bar">
      <button class="filter-tab active" data-filter="all" onclick="setFilter('all', this)">All</button>
      <button class="filter-tab" data-filter="task" onclick="setFilter('task', this)">Tasks</button>
      <button class="filter-tab" data-filter="marketing_request" onclick="setFilter('marketing_request', this)">Marketing</button>
    </div>

    <!-- Approvals List -->
    <div class="section-hd">
      <span class="section-hd-label">Pending Approvals</span>
      <div class="section-hd-rule"></div>
      <span class="section-hd-count" id="approvalCount">0</span>
      <button class="section-hd-action" onclick="loadApprovals()">↻ Refresh</button>
    </div>

    <div id="approvalsList">
      <div class="empty-state">
        <div class="empty-state-dash">—</div>
        <div class="empty-state-text">Loading approvals...</div>
      </div>
    </div>

  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="js/global-nav.js?v=2026.03.15.1"></script>
  <script>
    let allApprovals = [];
    let currentFilter = 'all';

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderApprovals();
    }

    async function loadApprovals() {
      const client = document.getElementById('clientFilter').value;
      const url = client ? `/api/approvals?client=${client}` : '/api/approvals';

      try {
        const res = await fetch(url);
        const data = await res.json();
        allApprovals = data.approvals || [];
        renderApprovals();
        updateStats();
        setConn(true);
      } catch (e) {
        console.error('Failed to load approvals:', e);
        setConn(false);
      }
    }

    function setConn(ok) {
      const dot = document.getElementById('connDot');
      const lbl = document.getElementById('connLabel');
      dot.className = 'conn-dot ' + (ok ? 'live' : 'dead');
      lbl.textContent = ok ? 'LIVE' : 'OFFLINE';
    }

    function updateStats() {
      const pending  = allApprovals.filter(a => !a.approvedAt && !a.rejectedAt).length;
      const approved = allApprovals.filter(a => a.approvedAt).length;
      const rejected = allApprovals.filter(a => a.rejectedAt).length;
      document.getElementById('statPending').textContent  = pending;
      document.getElementById('statApproved').textContent = approved;
      document.getElementById('statRejected').textContent = rejected;
      document.getElementById('statUnt').textContent       = allApprovals.filter(a => a.client === 'unt').length;
      document.getElementById('statBuddhas').textContent   = allApprovals.filter(a => a.client === 'buddhas').length;
    }

    function renderApprovals() {
      const filtered = currentFilter === 'all'
        ? allApprovals
        : allApprovals.filter(a => a.type === currentFilter);

      document.getElementById('approvalCount').textContent = filtered.length;
      const el = document.getElementById('approvalsList');

      if (!filtered.length) {
        el.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-dash">✓</div>
            <div class="empty-state-text">No pending approvals</div>
          </div>`;
        return;
      }

      el.innerHTML = filtered.map(a => {
        const typeLabel   = a.type === 'marketing_request' ? 'MARKETING' : 'TASK';
        const priClass    = a.priority === 'urgent' ? 'pill-blocked' : a.priority === 'high' ? 'pill-amber' : 'pill-active';
        const priLabel    = (a.priority || 'MEDIUM').toUpperCase();
        const clientBadge = a.client ? `<span class="pill pill-muted">${a.client.toUpperCase()}</span>` : '';
        const stateClass  = a.approvedAt ? 'state-approved' : a.rejectedAt ? 'state-rejected' : '';

        return `
          <div class="approval-card ${stateClass} mb-3" data-id="${a.id}">
            <div class="approval-card-header">
              <span class="pill pill-active">${typeLabel}</span>
              ${clientBadge}
              <span class="pill ${priClass}">${priLabel}</span>
            </div>
            <div class="approval-card-title">${escapeHtml(a.title)}</div>
            <div class="approval-card-desc">${escapeHtml(a.description || '')}</div>
            <div class="approval-card-meta">
              <span>Created ${getTimeAgo(a.createdAt)}</span>
              <span>Owner: ${a.owner || 'unassigned'}</span>
              ${a.projectId ? `<span>Project: ${a.projectId}</span>` : ''}
              ${a.revisionCount ? `<span style="color:var(--amber);">Rev #${a.revisionCount}</span>` : ''}
            </div>
            <div class="approval-card-actions">
              <button class="btn btn-approve btn-sm" onclick="approve('${a.id}', '${a.type}')">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                Approve
              </button>
              <button class="btn btn-ghost btn-sm" onclick="revise('${a.id}', '${a.type}')">Request Revision</button>
              <button class="btn btn-danger btn-sm" onclick="reject('${a.id}', '${a.type}')">Reject</button>
            </div>
          </div>`;
      }).join('');
    }

    async function approve(id, type) {
      if (type !== 'task') { showToast('Only task approvals are supported currently', 'warn'); return; }
      try {
        const res  = await fetch(`/api/approvals/task/${id}/approve`, { method: 'POST' });
        const data = await res.json();
        if (data.success) { 
          showToast('Approved', 'ok'); 
          loadApprovals();
          
          // Check if we should show GitHub commit option
          const approval = allApprovals.find(a => a.id === id);
          if (approval && approval.projectId) {
            const projRes = await fetch(`/api/projects/${approval.projectId}/details`);
            const projData = await projRes.json();
            if (projData.project?.githubRepo) {
              showToast('Want to commit to GitHub? Check the project page.', 'info');
            }
          }
        }
        else showToast(data.error || 'Failed', 'err');
      } catch (e) { showToast('Error: ' + e.message, 'err'); }
    }
    
    // GitHub commit modal
    let currentProjectForCommit = null;
    
    async function showCommitModal(projectId, projectName) {
      currentProjectForCommit = projectId;
      
      // Fetch project details to get deliverables
      try {
        const res = await fetch(`/api/projects/${projectId}/details`);
        const data = await res.json();
        const deliverables = data.deliverables || [];
        
        const modal = document.getElementById('commitModal');
        const list = document.getElementById('commitFileList');
        
        if (deliverables.length === 0) {
          list.innerHTML = '<div class="empty-state">No deliverables found. Run a pipeline first.</div>';
        } else {
          list.innerHTML = deliverables.map(d => `
            <label style="display:flex;align-items:center;gap:.5rem;padding:.25rem;">
              <input type="checkbox" class="commit-file-check" value="${d.id}" data-path="${d.outputPath || d.title}">
              <span style="font-family:var(--font-mono);font-size:11px">${d.title || d.outputPath}</span>
            </label>
          `).join('');
        }
        
        document.getElementById('commitProjectName').textContent = projectName;
        modal.classList.add('open');
        document.getElementById('commitOverlay').classList.add('show');
      } catch (e) {
        showToast('Error loading project: ' + e.message, 'err');
      }
    }
    
    function closeCommitModal() {
      document.getElementById('commitModal').classList.remove('open');
      document.getElementById('commitOverlay').classList.remove('show');
    }
    
    async function doGitHubCommit() {
      const branchName = document.getElementById('commitBranch').value.trim() || `feature/changes-${Date.now()}`;
      const commitMsg = document.getElementById('commitMessage').value.trim();
      
      if (!commitMsg) {
        showToast('Commit message required', 'warn');
        return;
      }
      
      const checkboxes = document.querySelectorAll('.commit-file-check:checked');
      if (checkboxes.length === 0) {
        showToast('Select at least one file', 'warn');
        return;
      }
      
      // Get deliverable details
      const files = [];
      for (const cb of checkboxes) {
        const deliverableId = cb.value;
        const path = cb.dataset.path;
        files.push({ path, deliverableId });
      }
      
      showToast('Committing to GitHub...', 'info');
      
      try {
        const res = await fetch('/api/github/commit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            projectId: currentProjectForCommit,
            branchName,
            commitMessage: commitMsg,
            files: files.map(f => ({ path: f.path, deliverableId: f.deliverableId }))
          })
        });
        const data = await res.json();
        
        if (data.success) {
          showToast('Committed!', 'ok');
          closeCommitModal();
          
          // Show result
          alert(`✅ Committed successfully!\n\nBranch: ${data.branch}\nFiles: ${data.filesCommitted}\n\n🔗 PR: ${data.prUrl}`);
        } else {
          showToast(data.error || 'Commit failed', 'err');
        }
      } catch (e) {
        showToast('Error: ' + e.message, 'err');
      }
    }

    async function reject(id, type) {
      if (type !== 'task') { showToast('Only task rejections are supported currently', 'warn'); return; }
      const reason = prompt('Rejection reason (optional):');
      try {
        const res  = await fetch(`/api/approvals/task/${id}/reject`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ reason })
        });
        const data = await res.json();
        if (data.success) { showToast('Rejected', 'ok'); loadApprovals(); }
        else showToast(data.error || 'Failed', 'err');
      } catch (e) { showToast('Error: ' + e.message, 'err'); }
    }

    async function revise(id, type) {
      const notes = prompt('Revision notes (describe what needs to change):');
      if (notes === null) return; // cancelled
      try {
        // Use Phase G revision endpoint first; fall back to legacy task endpoint
        const res  = await fetch(`/api/approvals/${id}/revise`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ notes })
        });
        const data = await res.json();
        if (data.success) { showToast('Revision requested — pipeline re-launched', 'ok'); loadApprovals(); }
        else {
          // Fallback for task approvals that don't support the revise endpoint
          const res2 = await fetch(`/api/approvals/task/${id}/revision`, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ reason: notes })
          });
          const data2 = await res2.json();
          if (data2.success) { showToast('Revision requested', 'ok'); loadApprovals(); }
          else showToast(data2.error || data.error || 'Failed', 'err');
        }
      } catch (e) { showToast('Error: ' + e.message, 'err'); }
    }

    function showToast(msg, type) {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = `toast toast-${type || 'ok'}`;
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(() => t.remove(), 3500);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function getTimeAgo(dateStr) {
      if (!dateStr) return 'unknown';
      const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
      if (diff < 60)    return 'just now';
      if (diff < 3600)  return `${Math.floor(diff/60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
      return `${Math.floor(diff/86400)}d ago`;
    }

    loadApprovals();
    setInterval(loadApprovals, 30000);
  </script>
  
  <!-- GitHub Commit Modal -->
  <div id="commitOverlay" class="drawer-overlay" onclick="closeCommitModal()"></div>
  <div id="commitModal" class="drawer">
    <div class="drawer-header">
      <div>
        <div class="drawer-title">Commit to GitHub</div>
        <div class="drawer-subtitle">Project: <span id="commitProjectName">—</span></div>
      </div>
      <button class="btn btn-ghost btn-icon" onclick="closeCommitModal()">✕</button>
    </div>
    <div class="drawer-body">
      <div class="field-group mb-4">
        <label class="field-label">Branch Name</label>
        <input type="text" id="commitBranch" class="field" placeholder="feature/changes-2026-03-15" value="feature/changes-">
      </div>
      <div class="field-group mb-4">
        <label class="field-label">Commit Message *</label>
        <input type="text" id="commitMessage" class="field" placeholder="Add new feature: description of changes">
      </div>
      <div class="field-group mb-4">
        <label class="field-label">Select Deliverables to Commit</label>
        <div id="commitFileList" style="max-height:200px;overflow-y:auto;background:var(--surface-2);padding:.5rem;border:1px solid var(--rule);">
          <div class="empty-state">Loading...</div>
        </div>
      </div>
      <button class="btn btn-primary" onclick="doGitHubCommit()" style="width:100%;">
        🚀 Commit & Push to GitHub
      </button>
    </div>
  </div>
</body>
</html>
